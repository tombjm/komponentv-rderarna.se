<body>
  <div class="container">

    <h1>Kontakt</h1>
    <div class="tagline">Skicka en kort beskrivning så återkommer vi, eller ring: 079-354 28 35</div>

    <hr>
    <nav>

    <hr>

    <div class="box">
      <b>Tips:</b> Skriv gärna byggår, antal lägenheter, samt om ni har tidigare underhållsplan.
    </div>

  <form action="https://formspree.io/f/mojegwvg" method="POST">
            <label>
              Namn
              <input name="name" required>
            </label>
          
            <label>
              E-post
              <input type="email" name="email" required>
            </label>
          
            <label>
              Meddelande
              <textarea name="message" rows="6" required></textarea>
            </label>
          
            <!-- valfritt: ämne i mailet -->
            <input type="hidden" name="_subject" value="Nytt meddelande från komponentvarderarna.se">
          
            <button type="submit">Skicka</button>
          </form>

    <hr>
    <div class="footer">© Komponentvärderarna</div>

  </div>
